name: hive_flutter_kit
description: A Flutter plugin to seamlessly integrate Hive blockchain authentication (via AIOHA-JS) and operations into your Flutter applications.
version: 2.3.1
homepage: https://sag333ar.github.io/HiveFlutterKit/
repository: https://github.com/sag333ar/HiveFlutterKit
issue_tracker: https://github.com/sag333ar/HiveFlutterKit/issues

environment:
  sdk: ^3.7.2
  flutter: ">=3.3.0"

dependencies:
  cached_network_image: ^3.4.1
  crypto: ^3.0.6
  chewie: ^1.11.1
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_staggered_grid_view: ^0.7.0
  flutter_inappwebview: ^6.1.5
  flutter_secure_storage: 9.2.4
  flutter_markdown: ^0.7.7+1
  flutter_html: ^3.0.0
  get_storage: ^2.1.1
  http_parser: ^4.1.2
  http: ^1.4.0
  image_picker: ^1.1.2
  image: ^4.5.4
  js: ^0.6.3
  html: ^0.15.4
  mime: ^2.0.0
  plugin_platform_interface: ^2.0.2
  qr_flutter: ^4.1.0
  share_plus: ^11.0.0
  scrollable_positioned_list: ^0.3.8
  timeago: ^3.7.1
  url_launcher: ^6.3.1
  video_player: ^2.9.5
  video_player_web_hls: ^1.3.0
  web: ^1.1.1
  collection: ^1.19.1
  file_picker: ^10.2.0
  another_tus_client: ^3.2.6
  cross_file: ^0.3.4+2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # This section identifies this Flutter project as a plugin project.
  # The 'pluginClass' specifies the class (in Java, Kotlin, Swift, Objective-C, etc.)
  # which should be registered in the plugin registry. This is required for
  # using method channels.
  # The Android 'package' specifies package in which the registered class is.
  # This is required for using method channels on Android.
  # The 'ffiPlugin' specifies that native code should be built and bundled.
  # This is required for using `dart:ffi`.
  # All these are used by the tooling to maintain consistency when
  # adding or updating assets for this project.
  plugin:
    platforms:
      android:
        package: com.example.hive_flutter_kit
        pluginClass: HiveFlutterKitPlugin
      ios:
        pluginClass: AiohaFlutterCorePlugin
      web:
        pluginClass: HiveFlutterKitWeb
        fileName: core/hive_flutter_kit_web.dart

  # To add assets to your plugin package, add an assets section, like this:
  assets:
    - web/hiveflutterkit.js
    - assets/images/
    - assets/images/hive-keychain-logo.png
    - assets/images/hiveauth_icon.png
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your plugin package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/to/font-from-package
